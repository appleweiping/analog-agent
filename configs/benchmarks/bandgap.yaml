{
  "version": "bandgap_v1",
  "family": "bandgap",
  "freeze_policy": {
    "frozen_version": "bandgap_v1",
    "paper_track": true,
    "change_rule": "create_v2_or_preserve_v1"
  },
  "task": {
    "task_id": "bandgap_v1",
    "process_node": "65nm",
    "supply_voltage_v": 1.2,
    "objectives": {
      "minimize": ["power_w", "temperature_coefficient_ppm_per_c"]
    },
    "hard_constraints": {
      "power_w": {"max": 0.0005},
      "temperature_coefficient_ppm_per_c": {"max": 30.0},
      "line_regulation_mv_per_v": {"max": 3.0}
    },
    "environment": {
      "temperature_c": [27.0],
      "corners": ["tt"],
      "supply_voltage_v": 1.2
    },
    "testbench_plan": ["op", "tran"],
    "design_variables": ["area_ratio", "r1", "r2", "w_core", "l_core", "ibias"]
  },
  "design_variables": {
    "area_ratio": {
      "units": "ratio",
      "role": "emitter_area_ratio",
      "description": "PTAT-to-CTAT device area ratio proxy"
    },
    "r1": {
      "units": "ohm",
      "role": "ptat_resistance",
      "description": "PTAT branch resistance"
    },
    "r2": {
      "units": "ohm",
      "role": "ctat_resistance",
      "description": "CTAT summation resistance"
    },
    "w_core": {
      "units": "m",
      "role": "core_bias_width",
      "description": "core bias transistor width proxy"
    },
    "l_core": {
      "units": "m",
      "role": "core_bias_length",
      "description": "core bias transistor length proxy"
    },
    "ibias": {
      "units": "A",
      "role": "startup_bias_current",
      "description": "startup and core bias current proxy"
    }
  },
  "measurement_targets": ["power_w", "temperature_coefficient_ppm_per_c", "line_regulation_mv_per_v"],
  "paths": {
    "netlist_template": "templates/netlist/bandgap/v1/bandgap_demonstrator_truth.spice.tpl",
    "quick_truth_testbench": "templates/testbench/bandgap/v1/quick_truth.yaml",
    "focused_truth_testbench": "templates/testbench/bandgap/v1/focused_truth.yaml",
    "measurement_contract": "templates/testbench/bandgap/v1/measurement_contract.yaml"
  },
  "defaults": {
    "backend_preference": "ngspice",
    "fidelity_policy": {
      "default_fidelity": "quick_truth",
      "promoted_fidelity": "focused_truth",
      "quick_truth_analyses": ["op"],
      "focused_truth_analyses": ["op", "tran"],
      "escalation_thresholds": {
        "predicted_feasible_probability_min": 0.7,
        "near_feasible_margin_abs_max": 0.15,
        "focused_truth_batch_limit": 1,
        "measurement_recheck_enabled": true
      }
    },
    "model_binding": {
      "model_type": "builtin",
      "truth_level": "demonstrator_truth",
      "default_builtin_model": "builtin_demo_bandgap_reference_v1",
      "external_model_card_path": ""
    }
  }
}
