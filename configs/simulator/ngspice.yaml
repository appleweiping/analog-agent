backend: ngspice
binary:
binary_env_vars: ANALOG_AGENT_NGSPICE_BIN,NGSPICE_BIN
invocation_mode: native
timeout_seconds: 20
model_type: builtin
default_builtin_model: builtin_demo_ota2_small_signal_v1
external_model_card_path:
external_model_card_env_vars: ANALOG_AGENT_EXTERNAL_MODEL_CARD,NGSPICE_MODEL_CARD
pdk_root:
pdk_root_env_vars: ANALOG_AGENT_PDK_ROOT,SKY130_PDK_ROOT,PDK_ROOT
default_log_dir: .artifacts\ngspice_logs
smoke_test_netlist: scripts\smoke\test_ngspice_min.cir
require_explicit_log_path: true
supports_monte_carlo: false
paper_truth_mode: native_truth_required
container_service_name: api
container_workdir: /workspace
container_ngspice_bin: /usr/bin/ngspice
container_pdk_root: /pdk/sky130A
