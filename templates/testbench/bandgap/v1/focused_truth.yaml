{
  "version": "bandgap_v1",
  "fidelity_level": "focused_truth",
  "execution_policy": "serial",
  "early_termination_rules": [
    "stop_on_netlist_failure",
    "stop_on_simulation_error",
    "continue_after_op_for_line_regulation_review"
  ],
  "ordered_analyses": [
    {
      "analysis_type": "op",
      "order": 0,
      "parameters": {"purpose": "bandgap_nominal_reference_check"},
      "required_metrics": ["power_w", "temperature_coefficient_ppm_per_c"]
    },
    {
      "analysis_type": "tran",
      "order": 1,
      "parameters": {
        "time_step_s": 5e-8,
        "stop_time_s": 1.2e-4,
        "fidelity_mode": "focused_truth"
      },
      "required_metrics": ["line_regulation_mv_per_v"]
    }
  ]
}
